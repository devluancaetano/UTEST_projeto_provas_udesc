<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UTEST - Login Aluno</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="loginAluno.css">
</head>
<body>
    <main class="container">
        <div class="brand">
            <img src="logo.png" alt="Logo UTEST" class="logo">
            <h1></h1>
        </div>
        
        <div class="login-card">
            <h2>Olá, aluno!</h2>
            <p>Informe seus dados para começar a prova</p>

            <form id="loginForm">
                <div class="input-group">
                    <label for="email">Email institucional</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <button type="submit" class="btn-submit">Começar</button>
            </form>
        </div>
    </main>

</body>
</html>
